spring.application.name=scalora-booking-pro
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:scalora_booking_pro;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.secret=${JWT_SECRET:local-development-secret-change-before-production-please}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.super-admin.email=${SUPER_ADMIN_EMAIL:admin@scalora.local}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:}
app.whatsapp.enabled=${WHATSAPP_ENABLED:false}
app.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.graph-version=${WHATSAPP_GRAPH_VERSION:v20.0}

logging.level.com.scalora.bookingpro=INFO
